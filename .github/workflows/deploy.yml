name: Deploy EventSnap to Azure Static Website

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Deploy to Azure Static Website
        uses: azure/CLI@v1
        with:
          azcliversion: latest
          inlineScript: |
            az storage blob upload \
              --account-name eventsnapb00968411sa \
              --container-name '$web' \
              --file index.html \
              --name index.html \
              --overwrite true \
              --account-key "${{ secrets.AZURE_STORAGE_KEY }}"